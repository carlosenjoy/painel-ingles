  function planoModelo(turma){
    const s = serieDe(turma);
    return "PLANO DE AÇÃO — "+turma+" (Meta Ouro "+METAS[s].ouro.toFixed(1)+")\n\n"+
      "• Diagnóstico: descritores do Currículo Paulista/BNCC ainda frágeis.\n"+

      "• Registro semanal do avanço rumo à Meta Ouro/Diamante.\n\n(Texto editável — liberdade de cátedra.)";

  function gerarInicial(){
    const turmas = Object.keys(BASE).map(nome=>{
      const t = BASE[nome];
      return { nome, serie:serieDe(nome), provaPaulista:t.pp,
        alunos: t.a.map((r,i)=>({
          id: nome.replace(/\s+/g,"-").toLowerCase()+"-"+i+"-"+Math.random().toString(36).slice(2,6),
          nome:r[0], nota1:(r[1]===null?"":r[1]), faltas1:(r[2]===null?"":r[2]),
          nota2:(r[3]===null?"":r[3]), faltas2:"", justificativa:""
        })) };
    });
    const planos = {}; Object.keys(BASE).forEach(n=> planos[n]=planoModelo(n));
    return { versao:SEED_VERSAO, turmas, planos };
  }

  function mediaNotas(a){
    const v=[a.nota1,a.nota2].map(x=> (x===""||x===null||x===undefined)?null:Number(x)).filter(x=>x!==null);
    if(!v.length) return null; return v.reduce((s,x)=>s+x,0)/v.length;
  }
  function corAluno(a, serie){
    const m=mediaNotas(a), M=METAS[serie];
    if(m===null) return {k:"cinza",row:"",dot:"⚪",sel:false};
    if(m>=M.diamante) return {k:"diamante",row:"bg-emerald-50",dot:"🟢",sel:true};
    if(m>=M.ouro) return {k:"verde",row:"bg-emerald-50",dot:"🟢",sel:false};
    if(m>=M.ouro*0.6) return {k:"amarelo",row:"bg-amber-50",dot:"🟡",sel:false};
    return {k:"vermelho",row:"bg-rose-50",dot:"🔴",sel:false};
  }
  function mediaTurmaBim(t,campo){
    const v=t.alunos.map(a=>a[campo]).map(x=>(x===""||x==null)?null:Number(x)).filter(x=>x!==null);
    if(!v.length) return null; return v.reduce((s,x)=>s+x,0)/v.length;
  }
  function nivelCard(t){
    const m=METAS[t.serie].ouro*10, pp=t.provaPaulista;
    if(pp===null||pp===undefined) return {k:"cinza",barra:"bg-slate-300",txt:"text-slate-400",borda:"border-slate-200",chip:"bg-slate-100 text-slate-600",rotulo:"Sem Prova Paulista"};
    if(pp>=m) return {k:"verde",barra:"bg-emerald-500",txt:"text-emerald-600",borda:"border-emerald-300",chip:"bg-emerald-100 text-emerald-700",rotulo:"No ritmo da meta"};
    if(pp>=m*0.7) return {k:"amarelo",barra:"bg-amber-500",txt:"text-amber-600",borda:"border-amber-200",chip:"bg-amber-100 text-amber-700",rotulo:"Em recomposição"};
    return {k:"vermelho",barra:"bg-rose-500",txt:"text-rose-600",borda:"border-rose-300",chip:"bg-rose-100 text-rose-700",rotulo:"Intervenção crítica"};
  }

  function Login({ aoEntrar }){
    const [modo,setModo]=useState("entrar"), [email,setEmail]=useState(""), [senha,setSenha]=useState("");
    const [erro,setErro]=useState(""), [msg,setMsg]=useState(""), [load,setLoad]=useState(false);
    async function enviar(){
      setErro("");setMsg("");
      if(!email||!senha){setErro("Preencha e-mail e senha.");return;}
      if(senha.length<6){setErro("A senha precisa ter ao menos 6 caracteres.");return;}
      setLoad(true);
      try{
        if(modo==="criar"){
          const {data,error}=await supabase.auth.signUp({email,password:senha});
          if(error) throw error;
          if(data.session) aoEntrar(data.session.user); else {setMsg("Conta criada! Já pode entrar.");setModo("entrar");}
        }else{
          const {data,error}=await supabase.auth.signInWithPassword({email,password:senha});
          if(error) throw error; aoEntrar(data.session.user);
        }
      }catch(e2){
        const m=(e2&&e2.message)||"";
        if(m.includes("Invalid login")) setErro("E-mail ou senha incorretos.");
        else if(m.includes("already registered")){setErro("Esse e-mail já tem conta. Tente entrar.");setModo("entrar");}
        else setErro(m||"Não foi possível continuar.");
      }finally{ setLoad(false); }
    }
    return e("div",{className:"min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900"},
      e("div",{className:"w-full max-w-md fade-in"},
        e("div",{className:"text-center mb-6"},
          e("div",{className:"inline-flex w-14 h-14 rounded-2xl bg-indigo-500 text-white text-2xl font-extrabold items-center justify-center shadow-lg"},"EN"),
          e("h1",{className:"mt-4 text-2xl font-extrabold text-white"},"Painel de Recomposição"),
          e("p",{className:"text-indigo-200 text-sm"},"Língua Inglesa · Fundamental II")),
        e("div",{className:"bg-white rounded-2xl shadow-xl p-6"},
          e("div",{className:"flex gap-2 mb-5 bg-slate-100 p-1 rounded-xl"},
            e("button",{onClick:()=>{setModo("entrar");setErro("");},className:"flex-1 py-2 rounded-lg text-sm font-semibold "+(modo==="entrar"?"bg-white shadow text-indigo-600":"text-slate-500")},"Entrar"),
            e("button",{onClick:()=>{setModo("criar");setErro("");},className:"flex-1 py-2 rounded-lg text-sm font-semibold "+(modo==="criar"?"bg-white shadow text-indigo-600":"text-slate-500")},"Criar conta")),
          e("label",{className:"block text-xs font-semibold text-slate-500 mb-1"},"E-MAIL"),
          e("input",{type:"email",value:email,onChange:ev=>setEmail(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&enviar(),className:"w-full mb-4 px-3 py-2.5 rounded-xl border border-slate-300 text-sm"}),
          e("label",{className:"block text-xs font-semibold text-slate-500 mb-1"},"SENHA"),
          e("input",{type:"password",value:senha,onChange:ev=>setSenha(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&enviar(),className:"w-full mb-4 px-3 py-2.5 rounded-xl border border-slate-300 text-sm"}),
          erro&&e("div",{className:"mb-3 text-sm text-rose-600 bg-rose-50 rounded-lg px-3 py-2"},erro),
          msg&&e("div",{className:"mb-3 text-sm text-emerald-700 bg-emerald-50 rounded-lg px-3 py-2"},msg),
          e("button",{onClick:enviar,disabled:load,className:"w-full py-2.5 rounded-xl bg-indigo-600 text-white font-semibold text-sm disabled:opacity-60"},load?"Aguarde…":(modo==="criar"?"Criar minha conta":"Entrar no painel")),
          e("p",{className:"mt-4 text-xs text-center text-slate-400"},"Cada professor enxerga apenas o próprio painel."))));
  }

  function Dashboard({ dados, abrir }){
    const totalAlunos=dados.turmas.reduce((s,t)=>s+t.alunos.length,0);
    const criticas=dados.turmas.filter(t=>{const m=METAS[t.serie].ouro*10;return t.provaPaulista!=null && t.provaPaulista<m*0.7;}).length;
    const prontos=dados.turmas.reduce((s,t)=>s+t.alunos.filter(a=>corAluno(a,t.serie).sel).length,0);
    return e("div",{className:"fade-in"},
      e("div",{className:"grid sm:grid-cols-4 gap-4 mb-6"},
        kpi("Turmas",dados.turmas.length,"text-slate-800"),
        kpi("Intervenção crítica",criticas,"text-rose-600"),
        kpi("Total de alunos",totalAlunos,"text-slate-800"),
        kpi("Prontos para o Mundo",prontos,"text-emerald-600")),
      e("div",{className:"grid sm:grid-cols-2 lg:grid-cols-3 gap-4"},
        dados.turmas.map(t=>{
          const nv=nivelCard(t), metaPct=METAS[t.serie].ouro*10, pp=t.provaPaulista, temPP=pp!=null;
          const faltam=temPP?Math.max(0,metaPct-pp):null;
          const m1=mediaTurmaBim(t,"nota1"), m2=mediaTurmaBim(t,"nota2");
          let tend="→",tcor="text-slate-400";
          if(m1!=null&&m2!=null){ if(m2>m1+0.05){tend="↑";tcor="text-emerald-600";} else if(m2<m1-0.05){tend="↓";tcor="text-rose-600";} }
          return e("button",{key:t.nome,onClick:()=>abrir(t.nome),
            className:"text-left bg-white rounded-2xl p-5 shadow-sm border-2 transition hover:shadow-md "+nv.borda},
            e("div",{className:"flex items-center justify-between mb-2"},
              e("span",{className:"text-xl font-extrabold text-slate-800"},t.nome),
              e("span",{className:"text-[10px] font-bold px-2 py-1 rounded-full "+nv.chip},nv.rotulo)),
            e("div",{className:"flex items-end justify-between mb-1"},
              e("span",{className:"text-4xl font-extrabold "+nv.txt}, temPP?pp+"%":"—"),
              e("span",{className:"text-xs text-slate-400 mb-1"},"Meta Ouro "+METAS[t.serie].ouro.toFixed(1)+" ("+metaPct+"%)")),
            e("div",{className:"w-full h-2.5 bg-slate-100 rounded-full overflow-hidden"},
              e("div",{className:"h-full rounded-full "+nv.barra,style:{width:(temPP?Math.min(100,pp):0)+"%"}})),
            e("div",{className:"mt-3 text-xs text-slate-500 flex items-center justify-between"},
              e("span",null,t.alunos.length+" aluno(s)"),
              e("span",{className:tcor+" font-semibold"},"Tendência "+tend)),
            e("div",{className:"mt-1 text-xs "+nv.txt+" font-semibold"},
              !temPP?"aguardando prova":(faltam<=0?"no ritmo da meta 🎯":"faltam "+faltam.toFixed(0)+" pts para a meta")));
        })));
  }
  function kpi(label,val,cor){ return e("div",{className:"bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"},
    e("div",{className:"text-xs text-slate-500 uppercase font-semibold"},label),
    e("div",{className:"text-3xl font-extrabold "+cor},val)); }

  function Detalhe({ turma, voltar, salvarTurma, plano, salvarPlano }){
    const [alunos,setAlunos]=useState(turma.alunos);
    const [txtPlano,setTxtPlano]=useState(plano||"");
    const [salvando,setSalvando]=useState(false), [status,setStatus]=useState("");
    const serie=turma.serie, M=METAS[serie];
    function editar(id,campo,val){ setAlunos(p=>p.map(a=>a.id===id?{...a,[campo]:val}:a)); }
    function add(){ setAlunos(p=>[...p,{id:"novo-"+Math.random().toString(36).slice(2,7),nome:"Novo aluno",nota1:"",faltas1:"",nota2:"",faltas2:"",justificativa:""}]); }
    function remover(id){ setAlunos(p=>p.filter(a=>a.id!==id)); }
    async function salvar(){
      setSalvando(true);setStatus("");
      const ok=await salvarTurma({...turma,alunos});
      const ok2=await salvarPlano(turma.nome,txtPlano);
      setSalvando(false);setStatus(ok&&ok2?"ok":"erro");setTimeout(()=>setStatus(""),3000);
    }
    const ordem={vermelho:0,amarelo:1,cinza:2,verde:3,diamante:4};
    const ordenados=[...alunos].sort((a,b)=>ordem[corAluno(a,serie).k]-ordem[corAluno(b,serie).k]);
    const criticos=alunos.filter(a=>corAluno(a,serie).k==="vermelho");
    const prontos=alunos.filter(a=>corAluno(a,serie).sel);

    return e("div",{className:"fade-in"},
      e("button",{onClick:voltar,className:"text-sm text-indigo-600 font-semibold mb-4"},"← Voltar para a visão geral"),
      e("div",{className:"flex flex-wrap items-center justify-between gap-3 mb-4"},
        e("div",null,
          e("h2",{className:"text-2xl font-extrabold text-slate-800"},"Turma "+turma.nome),
          e("p",{className:"text-sm text-slate-500"},alunos.length+" aluno(s) · Meta Ouro "+M.ouro.toFixed(1)+" · Diamante "+M.diamante.toFixed(1)+
            (turma.provaPaulista!=null?" · Prova Paulista "+turma.provaPaulista+"% de acertos":""))),
        e("div",{className:"flex gap-2"},
          e("div",{className:"px-3 py-2 rounded-xl bg-rose-50 border border-rose-200 text-center"},
            e("div",{className:"text-xs text-rose-500"},"Em estado crítico"),
            e("div",{className:"text-xl font-extrabold text-rose-600"},criticos.length)),
          e("div",{className:"px-3 py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-center"},
            e("div",{className:"text-xs text-emerald-600"},"Prontos para o Mundo"),
            e("div",{className:"text-xl font-extrabold text-emerald-600"},prontos.length)))),

      criticos.length>0 && e("div",{className:"mb-4 bg-rose-50 border border-rose-200 rounded-2xl p-4"},
        e("p",{className:"font-bold text-rose-700 mb-1"},"🔴 Foco imediato — alunos em estado crítico"),
        e("p",{className:"text-sm text-rose-600"},criticos.map(a=>a.nome).join(" · "))),

      e("div",{className:"overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm"},
        e("table",{className:"w-full text-sm"},
          e("thead",null,e("tr",{className:"bg-slate-50 text-slate-500 text-xs uppercase"},
            e("th",{className:"text-left p-3"},"Aluno"),
            e("th",{className:"p-3"},"1º bim"),e("th",{className:"p-3"},"Faltas 1º"),
            e("th",{className:"p-3"},"2º bim"),e("th",{className:"p-3"},"Faltas 2º"),
            e("th",{className:"text-left p-3"},"Justificativa pedagógica"),
            e("th",{className:"p-3"},"Sit."),e("th",{className:"p-3"}))),
          e("tbody",null, ordenados.map(a=>{
            const c=corAluno(a,serie);
            return e("tr",{key:a.id,className:"border-t border-slate-100 align-top "+c.row},
              e("td",{className:"p-3",style:{minWidth:"180px"}},
                e("input",{value:a.nome,onChange:ev=>editar(a.id,"nome",ev.target.value),className:"w-full font-semibold text-slate-800 bg-transparent border-b border-transparent hover:border-slate-200"}),
                c.k==="vermelho"&&e("span",{className:"inline-block mt-1 text-[10px] font-bold text-white bg-rose-500 px-2 py-0.5 rounded-full"},"Estado Crítico"),
                c.sel&&e("span",{className:"inline-block mt-1 text-[10px] font-bold text-white bg-emerald-500 px-2 py-0.5 rounded-full"},"⭐ Pronto para o Mundo")),
              celNum(a,"nota1",editar),celNum(a,"faltas1",editar),
              celNum(a,"nota2",editar),celNum(a,"faltas2",editar),
              e("td",{className:"p-3",style:{minWidth:"200px"}},
                e("textarea",{value:a.justificativa||"",onChange:ev=>editar(a.id,"justificativa",ev.target.value),rows:"2",placeholder:"Contexto do aluno…",className:"w-full px-2 py-1 rounded-lg border border-slate-200 text-xs resize-y"})),
              e("td",{className:"p-3 text-center text-lg"},c.dot),
              e("td",{className:"p-3 text-center"},e("button",{onClick:()=>remover(a.id),className:"text-slate-300 hover:text-rose-500 text-lg"},"×")));
          })))),

      e("div",{className:"flex flex-wrap items-center gap-3 mt-4"},
        e("button",{onClick:add,className:"px-4 py-2 rounded-xl bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-semibold"},"+ Adicionar aluno"),
        e("button",{onClick:salvar,disabled:salvando,className:"px-5 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold disabled:opacity-60"},salvando?"Salvando…":"Salvar alterações"),
        status==="ok"&&e("span",{className:"text-sm text-emerald-600 font-semibold"},"✓ Salvo na nuvem"),
        status==="erro"&&e("span",{className:"text-sm text-rose-600 font-semibold"},"Não consegui salvar. Verifique a internet.")),

      e("div",{className:"mt-6 bg-white rounded-2xl border border-slate-200 shadow-sm p-4"},
        e("div",{className:"flex items-center gap-2 mb-2"},
          e("span",{className:"w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 font-bold flex items-center justify-center text-sm"},"PA"),
          e("span",{className:"font-semibold text-slate-700"},"Plano de Ação — "+turma.nome),
          e("span",{className:"ml-auto text-xs text-slate-400"},"editável · liberdade de cátedra")),
        e("textarea",{value:txtPlano,onChange:ev=>setTxtPlano(ev.target.value),rows:"10",className:"w-full px-3 py-2 rounded-xl border border-slate-200 text-sm resize-y leading-relaxed"}),
        e("p",{className:"text-xs text-slate-400 mt-2"},"O plano é salvo junto com o botão “Salvar alterações” acima.")));
  }
  function celNum(a,campo,editar){
    return e("td",{className:"p-2 text-center"},
      e("input",{type:"number",step:"1",value:(a[campo]===null||a[campo]===undefined)?"":a[campo],
        onChange:ev=>editar(a.id,campo,ev.target.value),
        className:"w-16 text-center px-2 py-1 rounded-lg border border-slate-200"}));
  }

  function App(){
    const [usuario,setUsuario]=useState(null);
    const [load,setLoad]=useState(true);
    const [dados,setDados]=useState(null);
    const [turmaAberta,setTurmaAberta]=useState(null);
    const importRef=useRef(null);

    useEffect(()=>{
      if(!supabase){ setLoad(false); return; }
      supabase.auth.getSession().then(({data})=>{ if(data.session) setUsuario(data.session.user); setLoad(false); });
      const {data:sub}=supabase.auth.onAuthStateChange((_e,s)=>setUsuario(s?s.user:null));
      return ()=>sub.subscription.unsubscribe();
    },[]);

    useEffect(()=>{
      if(!usuario||!supabase){ setDados(null); return; }
      (async()=>{
        const {data}=await supabase.from("painel_dados").select("conteudo").eq("dono",usuario.id).maybeSingle();
        if(data&&data.conteudo&&data.conteudo.versao===SEED_VERSAO){ setDados(data.conteudo); }
        else { const ini=gerarInicial(); setDados(ini);
          await supabase.from("painel_dados").upsert({id:usuario.id,dono:usuario.id,conteudo:ini,atualizado_em:new Date().toISOString()}); }
      })();
    },[usuario]);

    async function persistir(nd){ setDados(nd);
      const {error}=await supabase.from("painel_dados").upsert({id:usuario.id,dono:usuario.id,conteudo:nd,atualizado_em:new Date().toISOString()});
      return !error; }
    async function salvarTurma(nt){ return persistir({...dados,turmas:dados.turmas.map(t=>t.nome===nt.nome?nt:t)}); }
    async function salvarPlano(turma,txt){ const p={...(dados.planos||{})}; p[turma]=txt; return persistir({...dados,planos:p}); }

    function exportar(){ const b=new Blob([JSON.stringify(dados,null,2)],{type:"application/json"});
      const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download="painel-ingles-backup.json"; a.click(); URL.revokeObjectURL(u); }
    function importar(ev){ const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
      r.onload=async()=>{ try{ const o=JSON.parse(r.result); if(!o.turmas) throw 0; await persistir(o); alert("Backup importado!"); }catch(e2){ alert("Arquivo inválido."); } };
      r.readAsText(f); ev.target.value=""; }
    async function sair(){ await supabase.auth.signOut(); setUsuario(null); setDados(null); setTurmaAberta(null); }

    if(!supabase) return e("div",{className:"min-h-screen flex items-center justify-center p-6 text-center"},
      e("div",{className:"max-w-md bg-rose-50 border border-rose-200 rounded-2xl p-6"},
        e("p",{className:"text-rose-700 font-semibold"},"Não foi possível carregar a nuvem. Verifique a internet e recarregue.")));
    if(load) return e("div",{className:"min-h-screen flex items-center justify-center text-slate-400"},"Carregando…");
    if(!usuario) return e(Login,{aoEntrar:u=>setUsuario(u)});
    if(!dados) return e("div",{className:"min-h-screen flex items-center justify-center text-slate-400"},"Carregando seu painel…");

    const turmaObj=turmaAberta?dados.turmas.find(t=>t.nome===turmaAberta):null;
    return e("div",{className:"min-h-screen"},
      e("header",{className:"bg-white border-b border-slate-200 sticky top-0 z-10"},
        e("div",{className:"max-w-6xl mx-auto px-4 py-3 flex flex-wrap items-center gap-3"},
          e("div",{className:"flex items-center gap-2"},
            e("div",{className:"w-9 h-9 rounded-xl bg-indigo-500 text-white font-extrabold flex items-center justify-center text-sm"},"EN"),
            e("div",null,
              e("div",{className:"font-extrabold text-slate-800 leading-tight"},"Painel de Recomposição"),
              e("div",{className:"text-xs text-slate-400 leading-tight"},"Língua Inglesa · Fundamental II"))),
          e("div",{className:"ml-auto flex items-center gap-2"},
            e("button",{onClick:exportar,className:"px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200"},"Exportar"),
            e("button",{onClick:()=>importRef.current.click(),className:"px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200"},"Importar"),
            e("input",{type:"file",accept:"application/json",ref:importRef,onChange:importar,className:"hidden"}),
            e("span",{className:"hidden sm:inline text-xs text-slate-400 max-w-[160px] truncate"},usuario.email),
            e("button",{onClick:sair,className:"px-3 py-1.5 rounded-lg text-xs font-semibold text-rose-600 bg-rose-50 hover:bg-rose-100"},"Sair")))),
      e("main",{className:"max-w-6xl mx-auto px-4 py-6"},
        turmaObj
          ? e(Detalhe,{turma:turmaObj,voltar:()=>setTurmaAberta(null),salvarTurma,plano:(dados.planos||{})[turmaObj.nome],salvarPlano})
          : e(React.Fragment,null,
              e("div",{className:"flex items-center justify-between mb-4"},
                e("h1",{className:"text-xl font-extrabold text-slate-800"},"Visão geral das turmas"),
                e("span",{className:"text-xs text-emerald-600"},"● Conectado à nuvem")),
              e(Dashboard,{dados,abrir:setTurmaAberta}))),
      e("footer",{className:"max-w-6xl mx-auto px-4 py-6 text-center text-xs text-slate-400"},
        "Documento vivo · dados protegidos por RLS · faça backup com “Exportar”."));
  }

  ReactDOM.createRoot(document.getElementById("root")).render(e(App));
})();
</script>
